version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - fintech-network



  zookeeper:
    image: confluentinc/cp-zookeeper:${ZOOKEEPER_VERSION}
    container_name: zookeeper
    restart: unless-stopped

    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}

    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"

    networks:
      - fintech-network



  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    container_name: kafka
    restart: unless-stopped

    depends_on:
      - zookeeper

    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"

    networks:
      - fintech-network



  auth-service:
    build:
      context: ./auth-services

    container_name: auth-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${AUTH_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${AUTH_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"

    depends_on:
      - postgres

    networks:
      - fintech-network



  user-service:
    build:
      context: ./user-services

    container_name: user-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${USER_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${USER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"

    depends_on:
      - postgres

    networks:
      - fintech-network



  wallet-service:
    build:
      context: ./wallet-services

    container_name: wallet-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${WALLET_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${WALLET_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${WALLET_SERVICE_PORT}:${WALLET_SERVICE_PORT}"

    depends_on:
      - postgres
      - kafka

    networks:
      - fintech-network



  payment-service:
    build:
      context: ./payment-services

    container_name: payment-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${PAYMENT_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${PAYMENT_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${PAYMENT_SERVICE_PORT}:${PAYMENT_SERVICE_PORT}"

    depends_on:
      - postgres
      - kafka

    networks:
      - fintech-network



  ledger-service:
    build:
      context: ./ledger-services

    container_name: ledger-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${LEDGER_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${LEDGER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${LEDGER_SERVICE_PORT}:${LEDGER_SERVICE_PORT}"

    depends_on:
      - postgres
      - kafka

    networks:
      - fintech-network



  fraud-service:
    build:
      context: ./fraud-service

    container_name: fraud-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${FRAUD_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${FRAUD_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${FRAUD_SERVICE_PORT}:${FRAUD_SERVICE_PORT}"

    depends_on:
      - postgres

    networks:
      - fintech-network



  notification-service:
    build:
      context: ./notification-services

    container_name: notification-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"

    depends_on:
      - kafka

    networks:
      - fintech-network



  api-gateway:
    build:
      context: ./api-gateway--services

    container_name: api-gateway
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVER_PORT: ${API_GATEWAY_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"

    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - payment-service
      - ledger-service
      - fraud-service
      - notification-service

    networks:
      - fintech-network



  frontend:
    build:
      context: ./fintech-frontend

    container_name: frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT}:80"

    depends_on:
      - api-gateway

    networks:
      - fintech-network



volumes:
  postgres-data:



networks:
  fintech-network:
    driver: bridge
