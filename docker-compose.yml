version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:${ZOOKEEPER_VERSION}
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${ZOOKEEPER_CLIENT_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:${KAFKA_PORT}"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - fintech-network

  auth-service:
    build:
      context: ./auth-services
      dockerfile: Dockerfile
    container_name: auth-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${AUTH_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  user-service:
    build:
      context: ./user-services
      dockerfile: Dockerfile
    container_name: user-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${USER_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  wallet-service:
    build:
      context: ./wallet-services
      dockerfile: Dockerfile
    container_name: wallet-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${WALLET_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${WALLET_SERVICE_PORT}:${WALLET_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  payment-service:
    build:
      context: ./payment-services
      dockerfile: Dockerfile
    container_name: payment-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${PAYMENT_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${PAYMENT_SERVICE_PORT}:${PAYMENT_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  ledger-service:
    build:
      context: ./ledger-services
      dockerfile: Dockerfile
    container_name: ledger-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${LEDGER_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${LEDGER_SERVICE_PORT}:${LEDGER_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  fraud-service:
    build:
      context: ./fraud-service
      dockerfile: Dockerfile
    container_name: fraud-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${FRAUD_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${FRAUD_SERVICE_PORT}:${FRAUD_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  notification-service:
    build:
      context: ./notification-services
      dockerfile: Dockerfile
    container_name: notification-service
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fintech-network

  api-gateway:
    build:
      context: ./api-gateway--services
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: on-failure
    env_file:
      - .env
    environment:
      SERVER_PORT: ${API_GATEWAY_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - payment-service
      - ledger-service
      - fraud-service
      - notification-service
    networks:
      - fintech-network

  frontend:
    build:
      context: ./fintech-frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: on-failure
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api-gateway
    networks:
      - fintech-network

networks:
  fintech-network:
    driver: bridge