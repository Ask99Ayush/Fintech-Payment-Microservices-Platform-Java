services:

  zookeeper:
    image: confluentinc/cp-zookeeper:${ZOOKEEPER_VERSION}
    container_name: zookeeper
    restart: unless-stopped

    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}

    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"

    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${ZOOKEEPER_CLIENT_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - fintech-network

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    container_name: kafka
    restart: unless-stopped

    depends_on:
      zookeeper:
        condition: service_healthy

    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"

    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:${KAFKA_PORT}"]
      interval: 10s
      timeout: 10s
      retries: 5

    networks:
      - fintech-network

  auth-service:
    build:
      context: ./auth-services
      dockerfile: Dockerfile

    container_name: auth-service
    restart: on-failure

    env_file:
      - .env

    environment:
      SERVER_PORT: ${AUTH_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${POSTGRES_DRIVER}

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${HIBERNATE_SHOW_SQL}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ${HIBERNATE_DIALECT}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"

    depends_on:
      kafka:
        condition: service_healthy

    networks:
      - fintech-network

  user-service:
    build:
      context: ./user-services
      dockerfile: Dockerfile

    container_name: user-service
    restart: on-failure

    env_file:
      - .env

    environment:
      SERVER_PORT: ${USER_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      JAVA_OPTS: ${JAVA_OPTS}

      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${POSTGRES_DRIVER}

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${HIBERNATE_SHOW_SQL}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ${HIBERNATE_DIALECT}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"

    depends_on:
