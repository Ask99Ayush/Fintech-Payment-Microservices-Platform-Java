spring.application.name=api-gateway

server.port=${SERVER_PORT}

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${AUTH_SERVICE_URL}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${USER_SERVICE_URL}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[2].id=wallet-service
spring.cloud.gateway.server.webmvc.routes[2].uri=${WALLET_SERVICE_URL}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/wallet/**

spring.cloud.gateway.server.webmvc.routes[3].id=payment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=${PAYMENT_SERVICE_URL}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.server.webmvc.routes[4].id=ledger-service
spring.cloud.gateway.server.webmvc.routes[4].uri=${LEDGER_SERVICE_URL}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/ledger/**

spring.cloud.gateway.server.webmvc.routes[5].id=fraud-service
spring.cloud.gateway.server.webmvc.routes[5].uri=${FRAUD_SERVICE_URL}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/fraud/**

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}